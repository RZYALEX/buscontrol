<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0c10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BusControl Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Nunito:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0c10;--s1:#12151c;--s2:#181c25;--s3:#1f2430;
  --brd:#252b38;--acc:#f0b429;--red:#ef4444;--grn:#22c55e;--blu:#3b82f6;
  --txt:#eef0f5;--mut:#5a6278;
  --ff:'Syne',sans-serif;--fm:'DM Mono',monospace;--fb:'Nunito',sans-serif;
}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--fb);background:var(--bg);color:var(--txt);display:flex;flex-direction:column;}
::-webkit-scrollbar{display:none;}
#app{flex:1;display:flex;flex-direction:column;height:100%;overflow:hidden;}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
.screen.active{display:flex;}

/* LOGIN */
#screen-login{background:radial-gradient(ellipse at 50% -10%,#1f1400,var(--bg) 65%);align-items:center;justify-content:flex-start;padding:24px 20px;overflow-y:auto;gap:0;}
.logo-big{font-family:var(--ff);font-size:42px;font-weight:800;color:var(--acc);letter-spacing:2px;line-height:1;margin-top:28px;}
.logo-big span{color:var(--txt);}
.logo-sub{font-size:10px;letter-spacing:3px;color:var(--mut);text-transform:uppercase;margin:4px 0 22px;}
.login-card{background:var(--s1);border:1px solid var(--brd);border-radius:20px;padding:22px;width:100%;max-width:340px;}
.lf{margin-bottom:12px;}
.lf label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--mut);margin-bottom:5px;font-weight:700;}
.lf input{width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:9px;color:var(--txt);font-family:var(--fm);font-size:14px;padding:11px 12px;outline:none;transition:border-color .2s;}
.lf input:focus{border-color:var(--acc);}
.pin-section{margin-top:16px;}
.pin-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--mut);font-weight:700;text-align:center;margin-bottom:10px;}
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:14px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--brd);transition:all .2s;}
.pin-dot.on{background:var(--acc);border-color:var(--acc);box-shadow:0 0 10px rgba(240,180,41,.5);}
.pin-dot.err{background:var(--red);border-color:var(--red);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.pk{background:var(--s2);border:none;border-radius:11px;color:var(--txt);font-family:var(--ff);font-size:22px;font-weight:700;padding:13px;cursor:pointer;user-select:none;}
.pk:active{background:var(--s3);color:var(--acc);transform:scale(.92);}
.pin-err{color:var(--red);font-size:11px;text-align:center;margin-top:8px;font-family:var(--fm);}
.pin-hint{color:var(--mut);font-size:10px;text-align:center;margin-top:8px;}

/* HEADER */
.app-header{background:var(--s1);border-bottom:1px solid var(--brd);padding:0 14px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.h-logo{font-family:var(--ff);font-size:19px;font-weight:800;color:var(--acc);}
.h-logo span{color:var(--txt);}
.h-bus{background:var(--acc);color:#000;font-family:var(--fm);font-size:10px;font-weight:600;padding:3px 8px;border-radius:5px;}
.btn-out{background:none;border:1px solid var(--brd);color:var(--mut);font-size:11px;padding:5px 10px;border-radius:7px;cursor:pointer;font-family:var(--fb);}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--brd);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nb{flex:1;background:none;border:none;color:var(--mut);font-family:var(--fb);font-size:9px;font-weight:700;padding:9px 2px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;text-transform:uppercase;letter-spacing:.4px;transition:color .2s;}
.nb .ico{font-size:18px;line-height:1;}
.nb.on{color:var(--acc);}

/* CONTENT */
.scroll-content{flex:1;overflow-y:auto;padding:16px 14px 90px;}

/* KPI */
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.kc{background:var(--s1);border:1px solid var(--brd);border-radius:13px;padding:13px;position:relative;overflow:hidden;}
.kc::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.kc.g::after{background:var(--grn);}
.kc.r::after{background:var(--red);}
.kc.b::after{background:var(--blu);}
.kc.y::after{background:var(--acc);}
.kc.p::after{background:#a78bfa;}
.kc.o::after{background:#fb923c;}
.kl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--mut);margin-bottom:5px;font-weight:700;}
.kv{font-family:var(--fm);font-size:20px;line-height:1;}
.kc.g .kv{color:var(--grn);}
.kc.r .kv{color:var(--red);}
.kc.b .kv{color:var(--blu);}
.kc.y .kv{color:var(--acc);}
.kc.p .kv{color:#a78bfa;}
.kc.o .kv{color:#fb923c;}
.ks{font-size:9px;color:var(--mut);margin-top:3px;}
.c-pos{color:var(--grn)!important;}
.c-neg{color:var(--red)!important;}

/* SECTION */
.sh{display:flex;align-items:center;gap:10px;margin-bottom:10px;margin-top:6px;}
.st{font-family:var(--ff);font-size:13px;font-weight:700;letter-spacing:.5px;white-space:nowrap;}
.sl{flex:1;height:1px;background:var(--brd);}

/* VUELTA CARD */
.vuelta-card{background:var(--s1);border:1px solid var(--brd);border-radius:14px;margin-bottom:12px;overflow:hidden;}
.vuelta-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;background:var(--s2);}
.vuelta-header:active{background:var(--s3);}
.vuelta-num{font-family:var(--ff);font-size:14px;font-weight:800;color:var(--acc);}
.vuelta-route{font-size:11px;color:var(--mut);margin-top:2px;}
.vuelta-summary{display:flex;gap:8px;align-items:center;}
.vtag{font-family:var(--fm);font-size:10px;padding:3px 7px;border-radius:5px;font-weight:600;}
.vtag-g{background:rgba(34,197,94,.15);color:var(--grn);}
.vtag-r{background:rgba(239,68,68,.15);color:var(--red);}
.vtag-y{background:rgba(240,180,41,.15);color:var(--acc);}
.vuelta-body{padding:14px;display:none;}
.vuelta-body.open{display:block;}
.vuelta-del{background:none;border:none;color:var(--red);font-size:13px;cursor:pointer;padding:4px 8px;}

/* FORM */
.fs{background:var(--s1);border:1px solid var(--brd);border-radius:13px;padding:14px;margin-bottom:10px;}
.fst{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--mut);font-weight:700;margin-bottom:11px;display:flex;align-items:center;gap:7px;}
.fdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.field{margin-bottom:9px;}
.field:last-child{margin-bottom:0;}
.field label{display:block;font-size:10px;color:var(--mut);font-weight:700;margin-bottom:4px;}
.field input,.field select{width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:8px;color:var(--txt);font-family:var(--fm);font-size:14px;padding:10px 11px;outline:none;transition:border-color .2s;}
.field input:focus,.field select:focus{border-color:var(--acc);}
.field select option{background:#111;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.btn-save{width:100%;background:var(--acc);color:#000;font-family:var(--ff);font-size:16px;font-weight:800;letter-spacing:2px;border:none;border-radius:11px;padding:15px;cursor:pointer;margin-top:6px;}
.btn-save:active{opacity:.85;}
.btn-add-vuelta{width:100%;background:none;border:2px dashed var(--acc);color:var(--acc);font-family:var(--ff);font-size:13px;font-weight:700;letter-spacing:1px;border-radius:11px;padding:13px;cursor:pointer;margin-bottom:11px;}
.btn-add-vuelta:active{background:rgba(240,180,41,.1);}

/* COLABORADORES */
.colab-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.colab-row input{flex:1;background:var(--bg);border:1px solid var(--brd);border-radius:7px;color:var(--txt);font-family:var(--fm);font-size:13px;padding:8px 10px;outline:none;}
.colab-row input:focus{border-color:var(--acc);}
.colab-row .amt-in{width:80px;flex-shrink:0;}
.colab-del{background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:2px 5px;}
.btn-add-colab{background:none;border:1px dashed var(--brd);color:var(--mut);font-family:var(--fb);font-size:11px;font-weight:600;border-radius:7px;padding:7px 12px;cursor:pointer;width:100%;margin-top:4px;}
.btn-add-colab:active{border-color:var(--acc);color:var(--acc);}

/* FRECUENCIA */
.frec-item{background:var(--bg);border:1px solid var(--brd);border-radius:9px;padding:10px 12px;margin-bottom:7px;}
.frec-item label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--mut);font-weight:700;display:block;margin-bottom:5px;}

/* ROUTE SELECT */
.route-row{background:var(--s2);border:1px solid var(--brd);border-radius:10px;padding:11px;margin-bottom:8px;}
.route-tag{background:rgba(240,180,41,.15);color:var(--acc);font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;font-family:var(--fm);}

/* TABLE */
.tw{background:var(--s1);border:1px solid var(--brd);border-radius:13px;overflow:hidden;margin-bottom:12px;}
.th{padding:11px 14px;border-bottom:1px solid var(--brd);}
.th h3{font-size:12px;font-weight:700;}
table{width:100%;border-collapse:collapse;font-size:11px;}
thead th{background:var(--s2);padding:7px 9px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--mut);font-weight:700;}
tbody tr{border-bottom:1px solid var(--brd);}
tbody tr:last-child{border-bottom:none;}
tbody td{padding:9px 9px;font-family:var(--fm);font-size:11px;}
.pos{color:var(--grn);}
.neg{color:var(--red);}

/* MONTH GRID */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:9px;margin-bottom:14px;}
.dc{background:var(--s1);border:1px solid var(--brd);border-radius:11px;padding:11px;cursor:pointer;}
.dc:active{border-color:var(--acc);}
.dn{font-family:var(--ff);font-size:24px;font-weight:800;color:var(--mut);line-height:1;}
.dnet{font-family:var(--fm);font-size:12px;margin-top:3px;}
.df{font-size:9px;color:var(--mut);margin-top:2px;}

/* SETTINGS */
.sc{background:var(--s1);border:1px solid var(--brd);border-radius:13px;padding:14px;margin-bottom:10px;}
.sc h3{font-size:10px;font-weight:700;margin-bottom:11px;text-transform:uppercase;letter-spacing:1px;color:var(--mut);}
.btn-ss{background:var(--s2);border:1px solid var(--brd);color:var(--txt);font-family:var(--fb);font-size:13px;font-weight:600;border-radius:9px;padding:11px 14px;cursor:pointer;width:100%;margin-top:6px;text-align:left;display:block;}
.btn-danger{color:var(--red);}

/* EXPORT */
.export-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
.btn-exp{background:none;border:1px solid var(--acc);color:var(--acc);font-family:var(--ff);font-size:11px;letter-spacing:1px;border-radius:9px;padding:11px 8px;cursor:pointer;width:100%;font-weight:700;text-align:center;}
.btn-exp:active{background:var(--acc);color:#000;}
.btn-exp.pdf{border-color:var(--red);color:var(--red);}
.btn-exp.pdf:active{background:var(--red);color:#fff;}

/* MISC */
.back-btn{background:none;border:1px solid var(--brd);color:var(--mut);padding:7px 12px;border-radius:7px;cursor:pointer;font-size:11px;margin-bottom:12px;font-family:var(--fb);}
.detail-title{font-family:var(--ff);font-size:16px;font-weight:700;margin-bottom:3px;}
.detail-sub{font-size:10px;color:var(--mut);margin-bottom:12px;}
.empty{text-align:center;padding:36px;color:var(--mut);}
.empty .ei{font-size:34px;margin-bottom:9px;}
.empty p{font-size:12px;}
.chip{display:inline-block;padding:3px 7px;border-radius:4px;font-size:9px;font-weight:700;margin:2px;}
.chip-g{background:rgba(34,197,94,.15);color:var(--grn);}
.chip-a{background:rgba(240,180,41,.15);color:var(--acc);}
.chip-p{background:rgba(167,139,250,.15);color:#a78bfa;}
.chip-r{background:rgba(239,68,68,.15);color:var(--red);}

/* TOTAL BAR */
.total-bar{background:linear-gradient(135deg,var(--s2),var(--s3));border:1px solid var(--acc);border-radius:13px;padding:14px;margin-bottom:12px;}
.total-bar-title{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--acc);font-weight:700;margin-bottom:10px;}
.total-bar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.tb-item{text-align:center;}
.tb-val{font-family:var(--fm);font-size:16px;font-weight:700;}
.tb-lbl{font-size:8px;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;}

/* PHOTOS */
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.photo-area{border:2px dashed var(--brd);border-radius:9px;min-height:85px;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;position:relative;}
.photo-area img{width:100%;max-height:150px;object-fit:cover;border-radius:7px;}
.ph-ph{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px;color:var(--mut);font-size:10px;pointer-events:none;}
.ph-ph .ico{font-size:20px;}
.photo-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.photo-rm{background:none;border:none;color:var(--red);font-size:10px;cursor:pointer;margin-top:3px;display:block;}

#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--grn);color:#000;font-family:var(--fm);font-size:12px;font-weight:600;padding:9px 18px;border-radius:8px;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.warn{background:var(--acc);}

.divider{height:1px;background:var(--brd);margin:10px 0;}
.badge-vuelta{background:var(--acc);color:#000;font-family:var(--fm);font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;}
</style>
</head>
<body>
<div id="app">

<!-- LOGIN -->
<div class="screen active" id="screen-login">
  <div style="text-align:center;width:100%">
    <div class="logo-big">🚌 BUS<span>CONTROL</span></div>
    <div class="logo-sub">Sistema de Gestión · Transporte</div>
  </div>
  <div class="login-card">
    <div class="lf"><label>Número de Bus</label><input id="l-bus" type="text" placeholder="Ej: 01, 12, 305..." inputmode="numeric"></div>
    <div class="pin-section">
      <div class="pin-label">Ingresa tu PIN</div>
      <div class="pin-dots"><div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div><div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div></div>
      <div class="pin-grid">
        <button class="pk" onclick="PP('1')">1</button><button class="pk" onclick="PP('2')">2</button><button class="pk" onclick="PP('3')">3</button>
        <button class="pk" onclick="PP('4')">4</button><button class="pk" onclick="PP('5')">5</button><button class="pk" onclick="PP('6')">6</button>
        <button class="pk" onclick="PP('7')">7</button><button class="pk" onclick="PP('8')">8</button><button class="pk" onclick="PP('9')">9</button>
        <div></div><button class="pk" onclick="PP('0')">0</button><button class="pk" onclick="PD()" style="font-size:15px">⌫</button>
      </div>
      <div id="pin-err" class="pin-err"></div>
      <div id="pin-hint" class="pin-hint">PIN por defecto: <strong style="color:var(--acc)">1234</strong></div>
    </div>
  </div>
</div>

<!-- APP -->
<div class="screen" id="screen-app">
  <div class="app-header">
    <div class="h-logo">🚌 BUS<span>CTRL</span></div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="h-bus" id="h-bus-num">BUS #01</div>
      <button class="btn-out" onclick="logout()">Salir</button>
    </div>
  </div>
  <div id="tab-daily"    class="scroll-content tab-panel"></div>
  <div id="tab-register" class="scroll-content tab-panel" style="display:none"></div>
  <div id="tab-history"  class="scroll-content tab-panel" style="display:none"></div>
  <div id="tab-monthly"  class="scroll-content tab-panel" style="display:none"></div>
  <div id="tab-settings" class="scroll-content tab-panel" style="display:none"></div>
  <nav class="bottom-nav">
    <button class="nb on" onclick="ST('daily',this)"><span class="ico">📊</span>Hoy</button>
    <button class="nb" onclick="ST('register',this)"><span class="ico">✏️</span>Registrar</button>
    <button class="nb" onclick="ST('history',this)"><span class="ico">📋</span>Historial</button>
    <button class="nb" onclick="ST('monthly',this)"><span class="ico">📅</span>Mensual</button>
    <button class="nb" onclick="ST('settings',this)"><span class="ico">⚙️</span>Ajustes</button>
  </nav>
</div>
</div>
<div id="toast"></div>

<script>
const SK='buscontrol_v5', DP='1234';

const ROUTE_DATA=[
  {name:'Machala → Huaquillas',km:75},{name:'Huaquillas → Machala',km:75},
  {name:'Machala → Sta.Rosa → Huaquillas',km:90},{name:'Huaquillas → Sta.Rosa → Machala',km:90},
  {name:'Machala → Guayaquil',km:200},{name:'Guayaquil → Machala',km:200},
  {name:'Machala → Santo Domingo',km:380},{name:'Santo Domingo → Machala',km:380},
  {name:'Guayaquil → Piura',km:430},{name:'Piura → Guayaquil',km:430},
  {name:'Huaquillas → Guayaquil',km:270},{name:'Guayaquil → Huaquillas',km:270},
  {name:'Guayaquil → Tumbes',km:310},{name:'Tumbes → Guayaquil',km:310},
  {name:'Huaquillas → Montañita',km:320},{name:'Montañita → Huaquillas',km:320},
  {name:'Machala → Alamor',km:150},{name:'Alamor → Machala',km:150},
  {name:'Otra (personalizada)',km:0},
];
const ROUTE_KM=Object.fromEntries(ROUTE_DATA.map(r=>[r.name,r.km]));

let DB={};
try{DB=JSON.parse(localStorage.getItem(SK)||'{}')}catch{}
let pinBuf='', curTab='daily', histDet=null, tmpPhotos={};
let vueltas=[]; // array de vueltas del día
let openVuelta=0; // índice abierto

const ld=()=>new Date().toISOString().split('T')[0];
const fm=n=>'$'+(+n||0).toFixed(2);
const fd=s=>new Date(s+'T12:00:00').toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'numeric'});
const nv=v=>parseFloat(v)||0;
const sv=()=>localStorage.setItem(SK,JSON.stringify(DB));

// ── VUELTA DEFAULTS ────────────────────────────────────────────────────────────
function newVuelta(n){
  return {
    num:n,
    route:'Machala → Huaquillas',
    routeCustom:'',
    km:75,
    income:0,
    gastos:{
      diesel:0, chofer:0, ayudante:0, peajes:0,
      comida:0, dormitorio:0, garage:0, limpieza:0,
      recargas:0, tarjeta:0
    },
    colaboradores:[],
    aportesDiario:0,
    frecuencia:{
      iess:0, dolarito:0, cuentas:0, repartible:0
    },
    notas:''
  };
}

function calcVuelta(v){
  const gFijos=Object.values(v.gastos||{}).reduce((s,x)=>s+nv(x),0);
  const gColab=(v.colaboradores||[]).reduce((s,c)=>s+nv(c.monto),0);
  const gFrec=Object.values(v.frecuencia||{}).reduce((s,x)=>s+nv(x),0);
  const totalGasto=gFijos+gColab+nv(v.aportesDiario)+gFrec;
  const totalFrecuencia=gFrec;
  const net=nv(v.income)-totalGasto;
  return {gFijos,gColab,gFrec,totalGasto,net,totalFrecuencia};
}

function calcDay(vueltas){
  const tots={income:0,gasto:0,net:0,frecuencia:0,km:0};
  (vueltas||[]).forEach(v=>{
    const c=calcVuelta(v);
    tots.income+=nv(v.income);
    tots.gasto+=c.totalGasto;
    tots.net+=c.net;
    tots.frecuencia+=c.gFrec;
    tots.km+=0;
  });
  return tots;
}

// ── PIN / LOGIN ────────────────────────────────────────────────────────────────
function udots(){for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d)d.className='pin-dot'+(pinBuf.length>i?' on':'');}}
function PP(k){if(pinBuf.length>=4)return;pinBuf+=k;udots();if(pinBuf.length===4)chkPin();}
function PD(){pinBuf=pinBuf.slice(0,-1);udots();}
function chkPin(){
  if(pinBuf===(DB.pin||DP)){
    const bus=document.getElementById('l-bus').value||DB.busNumber||'01';
    DB.busNumber=bus;sv();pinBuf='';udots();document.getElementById('pin-err').textContent='';
    document.getElementById('screen-login').classList.remove('active');
    document.getElementById('screen-app').classList.add('active');
    document.getElementById('h-bus-num').textContent='BUS #'+bus;
    RT(curTab);
  }else{
    for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d)d.className='pin-dot err';}
    document.getElementById('pin-err').textContent='PIN incorrecto ✕';
    setTimeout(()=>{pinBuf='';udots();document.getElementById('pin-err').textContent='';},900);
  }
}
function logout(){document.getElementById('screen-app').classList.remove('active');document.getElementById('screen-login').classList.add('active');}

function ST(tab,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.style.display='none');
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+tab).style.display='block';
  btn.classList.add('on');curTab=tab;RT(tab);
}

  const s=document.getElementById('vsummary-'+i);
  if(s) s.innerHTML=buildVueltaSummary(i);
  // also update header summary text
  const card=document.getElementById('vcard-'+i);
  if(card){
    const c=calcVuelta(vueltas[i]);
    const v=vueltas[i];
    const sub=card.querySelector('.vuelta-header > div > div:last-child');
    if(sub) sub.innerHTML=`${fm(nv(v.income))} ingreso · ${fm(c.totalGasto)} gasto · <span style="color:${c.net>=0?'var(--grn)':'var(--red)'}">${fm(c.net)} neto</span>`;
  }
}

function toggleVuelta(i){
  const b=document.getElementById('vbody-'+i);
  const t=document.getElementById('vtoggle-'+i);
  if(!b)return;
  const isOpen=b.classList.toggle('open');
  if(t) t.textContent=isOpen?'▲':'▼';
  if(isOpen) openVuelta=i;
}

function addVuelta(){
  const n=vueltas.length+1;
  vueltas.push(newVuelta(n));
  openVuelta=vueltas.length-1;
  renderVueltas();
  updateTotalesBar();
  setTimeout(()=>{
    const last=document.getElementById('vcard-'+(vueltas.length-1));
    if(last) last.scrollIntoView({behavior:'smooth',block:'start'});
  },100);
}

function delVuelta(i){
  if(vueltas.length<=1){showToast('⚠️ Debe haber al menos una vuelta',true);return;}
  vueltas.splice(i,1);
  vueltas.forEach((v,j)=>v.num=j+1);
  openVuelta=Math.min(openVuelta,vueltas.length-1);
  renderVueltas();
  updateTotalesBar();
}

function updateVuelta(i,k,val){
  vueltas[i][k]=nv(val)||val;
  updateVueltaSummary(i);
  updateTotalesBar();
}

function updateVueltaRoute(i,val){
  vueltas[i].route=val;
  vueltas[i].km=ROUTE_KM[val]||vueltas[i].km;
  const cr=document.getElementById('custom-route-'+i);
  if(cr) cr.style.display=val==='Otra (personalizada)'?'block':'none';
  // update km field
  const kmInput=document.querySelector(`#vbody-${i} input[onchange*="'km'"]`);
  if(kmInput && ROUTE_KM[val]) kmInput.value=ROUTE_KM[val];
  updateTotalesBar();
}

function updateGasto(i,k,val){
  vueltas[i].gastos[k]=nv(val);
  updateVueltaSummary(i);
  updateTotalesBar();
}

function updateFrecuencia(i,k,val){
  vueltas[i].frecuencia[k]=nv(val);
  updateVueltaSummary(i);
  updateTotalesBar();
}

function addColab(i){
  vueltas[i].colaboradores.push({nombre:'',monto:0});
  const c=vueltas[i].colaboradores;
  const ci=c.length-1;
  const container=document.getElementById('colabs-'+i);
  if(container){
    const row=document.createElement('div');
    row.className='colab-row';
    row.id=`crow-${i}-${ci}`;
    row.innerHTML=`<input type="text" placeholder="Ej: Boletero, Enganchador..." onchange="updateColab(${i},${ci},'nombre',this.value)"><input class="amt-in" type="number" placeholder="$0" inputmode="decimal" onchange="updateColab(${i},${ci},'monto',this.value)"><button class="colab-del" onclick="delColab(${i},${ci})">✕</button>`;
    container.appendChild(row);
  }
}

function updateColab(i,ci,k,val){
  if(!vueltas[i].colaboradores[ci])return;
  vueltas[i].colaboradores[ci][k]=k==='monto'?nv(val):val;
  updateVueltaSummary(i);
  updateTotalesBar();
}

function delColab(i,ci){
  vueltas[i].colaboradores.splice(ci,1);
  const container=document.getElementById('colabs-'+i);
  const row=document.getElementById(`crow-${i}-${ci}`);
  if(row) row.remove();
  updateVueltaSummary(i);
  updateTotalesBar();
}

// PHOTOS
function HP(key,input){
  const file=input.files[0];if(!file)return;

    tmpPhotos[key]=ev.target.result;
    const area=document.getElementById('pa-'+key);

    const rm=document.getElementById('rm-'+key);if(rm)rm.style.display='block';

}

}

// ── EXPORT CSV DÍA (automático al guardar) ────────────────────────────────────
function EX_CSV_day(r){
  let csv='\uFEFF';
  csv+=`BUSCONTROL PRO — REPORTE DEL DÍA\n`;
  csv+=`Bus #,${DB.busNumber||'01'}\n`;
  csv+=`Fecha,${r.date}\n`;
  csv+=`Generado,${new Date().toLocaleDateString('es-EC')} ${new Date().toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'})}\n\n`;
  csv+=`RESUMEN DEL DÍA\n`;
  csv+=`Total Ingresos,${r.income.toFixed(2)}\n`;
  csv+=`Total Gastos,${r.totalExpense.toFixed(2)}\n`;
  csv+=`Frecuencia,${(r.totalFrecuencia||0).toFixed(2)}\n`;
  csv+=`GANANCIA NETA,${r.net.toFixed(2)}\n`;
  csv+=`Vueltas,${r.totalVueltas}\n\n`;
  csv+=`DETALLE POR VUELTA\n`;
  csv+=`Vuelta,Ruta,Ingresos,Diesel,Chofer,Ayudante,Peajes,Comida,Dormitorio,Garage,Limpieza,Recargas,Tarjeta,Colaboradores,Aporte Diario,IESS,Dolarito,Cobro Cuentas,Repartibles,Total Gastos,Neto\n`;
  (r.vueltas||[]).forEach(v=>{
    const c=calcVuelta(v);
    const gColab=(v.colaboradores||[]).reduce((s,co)=>s+nv(co.monto),0);
    const ruta=v.route==='Otra (personalizada)'?v.routeCustom||'Personalizada':v.route;
    csv+=`${v.num},"${ruta}",${nv(v.income).toFixed(2)},${nv(v.gastos?.diesel).toFixed(2)},${nv(v.gastos?.chofer).toFixed(2)},${nv(v.gastos?.ayudante).toFixed(2)},${nv(v.gastos?.peajes).toFixed(2)},${nv(v.gastos?.comida).toFixed(2)},${nv(v.gastos?.dormitorio).toFixed(2)},${nv(v.gastos?.garage).toFixed(2)},${nv(v.gastos?.limpieza).toFixed(2)},${nv(v.gastos?.recargas).toFixed(2)},${nv(v.gastos?.tarjeta).toFixed(2)},${gColab.toFixed(2)},${nv(v.aportesDiario).toFixed(2)},${nv(v.frecuencia?.iess).toFixed(2)},${nv(v.frecuencia?.dolarito).toFixed(2)},${nv(v.frecuencia?.cuentas).toFixed(2)},${nv(v.frecuencia?.repartible).toFixed(2)},${c.totalGasto.toFixed(2)},${c.net.toFixed(2)}\n`;
    if((v.colaboradores||[]).filter(co=>nv(co.monto)>0).length){
      csv+=`,,Detalle colaboradores:\n`;
      v.colaboradores.filter(co=>nv(co.monto)>0).forEach(co=>csv+=`,,${co.nombre||'Sin nombre'},${nv(co.monto).toFixed(2)}\n`);
    }
    if(v.notas) csv+=`,,Notas:,"${v.notas}"\n`;
  });
  const b=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download=`BusControl_Bus${DB.busNumber||'01'}_${r.date}.csv`;
  a.click();
}

        ${v.notas?`<div style="margin-top:6px;font-size:10px;color:#888">📝 ${v.notas}</div>`:''}
      </div>
    </div>`;
  }).join('');

  const html=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>BusControl — ${fd(dateStr)}</title>
  <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

  .header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #f0b429;padding-bottom:14px;margin-bottom:18px;}

  .kpi-label{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:#666;margin-bottom:3px;font-weight:700;}
  .kpi.g .kpi-val{color:#16a34a;}.kpi.r .kpi-val{color:#dc2626;}.kpi.b .kpi-val{color:#2563eb;}.kpi.y .kpi-val{color:#d97706;}.kpi.p .kpi-val{color:#7c3aed;}
  .kpi-val{font-size:18px;font-weight:800;}
  .footer{margin-top:20px;padding-top:10px;border-top:1px solid #e5e7eb;font-size:10px;color:#9ca3af;text-align:center;}
  @media print{.no-print{display:none;}body{padding:14px;}}
  </style></head><body>
  <div class="header">
    <div><div class="logo">🚌 BUS<span>CONTROL</span> PRO</div><div style="font-size:11px;color:#666;margin-top:3px">Sistema de Gestión de Transporte</div></div>
    <div style="text-align:right;font-size:12px;color:#666"><strong style="display:block;font-size:15px;color:#1a1a2e">${fd(dateStr)}</strong>Bus #${r.busNumber||'01'} · ${r.totalVueltas||0} vueltas · ${(r.totalKm||0).toFixed(0)} km</div>
  </div>
  <div class="kpi-row" style="grid-template-columns:repeat(5,1fr)">

// ── PDF MENSUAL ─────────────────────────────────────────────────────────────────
function PDF_month(){
  const ms=ld().slice(0,7);
  const records=(DB.records||[]).filter(r=>r.date.startsWith(ms));
  if(!records.length){showToast('⚠️ Sin datos este mes',true);return;}
  const tI=records.reduce((s,r)=>s+r.income,0);
  const tE=records.reduce((s,r)=>s+r.totalExpense,0);
  const tN=tI-tE;
  const tKm=records.reduce((s,r)=>s+(r.totalKm||0),0);
  const tV=records.reduce((s,r)=>s+(r.totalVueltas||0),0);
  const mn=new Date(ms+'-01').toLocaleDateString('es-EC',{month:'long',year:'numeric'});

  const totByGasto={diesel:0,chofer:0,ayudante:0,peajes:0,comida:0,dormitorio:0,garage:0,limpieza:0,recargas:0,tarjeta:0};
  let totColab=0,totAporte=0,totIESS=0,totDol=0,totCuentas=0,totRep=0;
  records.forEach(r=>(r.vueltas||[]).forEach(v=>{
    Object.keys(totByGasto).forEach(k=>totByGasto[k]+=nv(v.gastos?.[k]));
    totColab+=(v.colaboradores||[]).reduce((s,c)=>s+nv(c.monto),0);
    totAporte+=nv(v.aportesDiario);
    totIESS+=nv(v.frecuencia?.iess);
    totDol+=nv(v.frecuencia?.dolarito);
    totCuentas+=nv(v.frecuencia?.cuentas);
    totRep+=nv(v.frecuencia?.repartible);
  }));

  const html=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>BusControl — ${mn}</title>
  <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Nunito',sans-serif;background:#fff;color:#1a1a2e;padding:24px;max-width:750px;margin:0 auto;}
  .header{display:flex;justify-content:space-between;border-bottom:3px solid #f0b429;padding-bottom:14px;margin-bottom:18px;}
  .logo{font-size:22px;font-weight:800;color:#f0b429;}.logo span{color:#1a1a2e;}
  table{width:100%;border-collapse:collapse;font-size:11px;}
  thead th{background:#f9fafb;padding:7px 9px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#9ca3af;font-weight:700;}
  tbody td{padding:7px 9px;border-bottom:1px solid #f3f4f6;}
  .amt{text-align:right;font-weight:700;}.pos{color:#16a34a;}.neg{color:#dc2626;}
  .total-row td{background:#f9fafb;font-weight:800;border-top:2px solid #e5e7eb;}
  .section{margin-bottom:16px;}.section h3{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#666;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #e5e7eb;}
  .footer{margin-top:20px;padding-top:10px;border-top:1px solid #e5e7eb;font-size:10px;color:#9ca3af;text-align:center;}
  @media print{.no-print{display:none;}body{padding:14px;}}
  </style></head><body>
  <div class="header">
    <div><div class="logo">🚌 BUS<span>CONTROL</span> PRO</div><div style="font-size:11px;color:#666;margin-top:3px">Reporte Mensual</div></div>
    <div style="text-align:right;font-size:12px;color:#666"><strong style="display:block;font-size:15px;color:#1a1a2e;text-transform:capitalize">${mn}</strong>Bus #${DB.busNumber||'01'} · ${records.length} días · ${tV} vueltas</div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:16px">
    ${[['Ingresos','$'+tI.toFixed(2),'#f0fdf4','#86efac','#16a34a'],['Gastos','$'+tE.toFixed(2),'#fef2f2','#fca5a5','#dc2626'],['Neto','$'+tN.toFixed(2),tN>=0?'#f0fdf4':'#fef2f2',tN>=0?'#86efac':'#fca5a5',tN>=0?'#16a34a':'#dc2626'],['Km',tKm.toFixed(0),'#f5f3ff','#c4b5fd','#7c3aed'],['Vueltas',tV,'#fffbeb','#fde68a','#d97706']].map(([l,v,bg,br,c])=>`<div style="background:${bg};border:1px solid ${br};border-radius:8px;padding:10px;text-align:center"><div style="font-size:8px;text-transform:uppercase;letter-spacing:1px;color:#666;margin-bottom:3px;font-weight:700">${l}</div><div style="font-size:16px;font-weight:800;color:${c}">${v}</div></div>`).join('')}
  </div>
  <div class="section"><h3>📅 Detalle diario</h3><table>
    <thead><tr><th>Fecha</th><th style="text-align:center">Vueltas</th><th style="text-align:center">Km</th><th class="amt">Ingresos</th><th class="amt">Gastos</th><th class="amt">Neto</th></tr></thead>
    <tbody>
      ${records.map(r=>`<tr><td>${fd(r.date)}</td><td style="text-align:center">${r.totalVueltas||0}</td><td style="text-align:center;color:#7c3aed">${(r.totalKm||0).toFixed(0)}</td><td class="amt pos">$${r.income.toFixed(2)}</td><td class="amt neg">$${r.totalExpense.toFixed(2)}</td><td class="amt ${r.net>=0?'pos':'neg'}">$${r.net.toFixed(2)}</td></tr>`).join('')}
      <tr class="total-row"><td>TOTAL</td><td style="text-align:center">${tV}</td><td style="text-align:center;color:#7c3aed">${tKm.toFixed(0)}</td><td class="amt pos">$${tI.toFixed(2)}</td><td class="amt neg">$${tE.toFixed(2)}</td><td class="amt ${tN>=0?'pos':'neg'}">$${tN.toFixed(2)}</td></tr>
    </tbody>
  </table></div>
  <div class="section"><h3>💰 Gastos del mes por concepto</h3><table>
    <thead><tr><th>Concepto</th><th class="amt">Total mes</th><th class="amt">Prom/día</th></tr></thead>
    <tbody>
      ${Object.entries(totByGasto).filter(([k,v])=>v>0).map(([k,v])=>`<tr><td>${gastoLabel(k)}</td><td class="amt neg">$${v.toFixed(2)}</td><td class="amt" style="color:#666">$${(v/records.length).toFixed(2)}</td></tr>`).join('')}
      ${totColab>0?`<tr><td>👥 Colaboradores</td><td class="amt neg">$${totColab.toFixed(2)}</td><td class="amt" style="color:#666">$${(totColab/records.length).toFixed(2)}</td></tr>`:''}
      ${totAporte>0?`<tr><td>🏢 Aporte Diario</td><td class="amt neg">$${totAporte.toFixed(2)}</td><td class="amt" style="color:#666">$${(totAporte/records.length).toFixed(2)}</td></tr>`:''}
    </tbody>
  </table></div>
  <div class="section"><h3>📋 Frecuencia del mes</h3><table>
    <thead><tr><th>Concepto</th><th class="amt">Total</th></tr></thead>
    <tbody>
      ${totIESS>0?`<tr><td>🏥 Ahorro Socios IESS</td><td class="amt" style="color:#2563eb">$${totIESS.toFixed(2)}</td></tr>`:''}
      ${totDol>0?`<tr><td>⚡ Dolarito / Defensa Frecuencia</td><td class="amt" style="color:#2563eb">$${totDol.toFixed(2)}</td></tr>`:''}
      ${totCuentas>0?`<tr><td>📋 Ahorro Cobro Cuentas</td><td class="amt" style="color:#2563eb">$${totCuentas.toFixed(2)}</td></tr>`:''}
      ${totRep>0?`<tr><td>💼 Socios B2-B4 / Repartibles</td><td class="amt" style="color:#2563eb">$${totRep.toFixed(2)}</td></tr>`:''}
      <tr class="total-row"><td>TOTAL FRECUENCIA</td><td class="amt" style="color:#2563eb">$${(totIESS+totDol+totCuentas+totRep).toFixed(2)}</td></tr>
    </tbody>
  </table></div>
  <div class="footer">BusControl Pro · Bus #${DB.busNumber||'01'} · ${new Date().toLocaleDateString('es-EC')} ${new Date().toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'})}</div>
  <div class="no-print" style="margin-top:18px;text-align:center"><button onclick="window.print()" style="background:#f0b429;border:none;border-radius:8px;padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer">🖨️ Imprimir / Guardar PDF</button></div>
  </body></html>`;

  const w=window.open('','_blank');w.document.write(html);w.document.close();
}

// ── SETTINGS ───────────────────────────────────────────────────────────────────
function RS(){
  const el=document.getElementById('tab-settings');
  el.innerHTML=`
    <div class="sc"><h3>🚌 Datos del bus</h3>
      <div class="field"><label>Número de Bus</label><input type="text" id="s-bus" value="${DB.busNumber||''}" placeholder="Ej: 01, 12..." inputmode="numeric"></div>
      <button class="btn-ss" onclick="SB()">💾 Guardar número de bus</button>
    </div>
    <div class="sc"><h3>🔒 Cambiar PIN</h3>
      <div class="field"><label>Nuevo PIN (4 dígitos)</label><input type="password" id="s-p1" maxlength="4" placeholder="••••" inputmode="numeric"></div>
      <div class="field"><label>Confirmar PIN</label><input type="password" id="s-p2" maxlength="4" placeholder="••••" inputmode="numeric"></div>
      <button class="btn-ss" onclick="SP()">🔑 Actualizar PIN</button>
    </div>
    <div class="sc"><h3>⚠️ Zona peligrosa</h3>
      <button class="btn-ss btn-danger" onclick="CA()">🗑️ Borrar todos los registros</button>
    </div>
    <div style="text-align:center;color:var(--mut);font-size:10px;margin-top:14px">BusControl Pro v5.0 · Bus #${DB.busNumber||'?'}</div>`;
}
function SB(){DB.busNumber=document.getElementById('s-bus').value||DB.busNumber||'01';sv();document.getElementById('h-bus-num').textContent='BUS #'+DB.busNumber;showToast('✅ Bus actualizado');}
function SP(){const p1=document.getElementById('s-p1').value,p2=document.getElementById('s-p2').value;if(!/^\d{4}$/.test(p1)){showToast('⚠️ PIN debe ser 4 dígitos',true);return;}if(p1!==p2){showToast('⚠️ PINs no coinciden',true);return;}DB.pin=p1;sv();document.getElementById('s-p1').value='';document.getElementById('s-p2').value='';showToast('🔒 PIN actualizado');}
function CA(){if(confirm('¿Borrar TODOS los registros?')){DB.records=[];sv();showToast('🗑️ Borrado');}}

let toastT;
function showToast(msg,warn=false){const t=document.getElementById('toast');t.textContent=msg;t.className='show'+(warn?' warn':'');clearTimeout(toastT);toastT=setTimeout(()=>t.className='',2800);}

window.addEventListener('DOMContentLoaded',()=>{
  if(DB.busNumber)document.getElementById('l-bus').value=DB.busNumber;
  if(DB.pin)document.getElementById('pin-hint').style.display='none';
  document.getElementById('tab-daily').style.display='block';
});
</script>
